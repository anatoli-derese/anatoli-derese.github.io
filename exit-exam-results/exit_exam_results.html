<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exit Exam Results - AAU (471 Students)</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --pass: #3fb950; --fail: #f85149; --accent: #58a6ff; --warn: #d2991d; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:20px; max-width:1600px; margin:0 auto; }
h1 { font-size:24px; margin-bottom:4px; }
.subtitle { color:var(--muted); font-size:13px; margin-bottom:16px; }
.filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
.filters select, .filters input { background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; }
.filters select { cursor:pointer; }
.filters input { flex:1; min-width:200px; }
.filters input::placeholder { color:var(--muted); }
.btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:6px; font-size:12px; cursor:pointer; }
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn.active { background:rgba(88,166,255,0.15); border-color:var(--accent); color:var(--accent); }
.btn-fail.active { background:rgba(248,81,73,0.15); border-color:var(--fail); color:var(--fail); }
.btn-pass.active { background:rgba(63,185,80,0.15); border-color:var(--pass); color:var(--pass); }
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:16px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; cursor:pointer; transition:border-color .2s; }
.stat-card:hover { border-color:var(--accent); }
.stat-card .value { font-size:26px; font-weight:700; }
.stat-card .label { font-size:11px; color:var(--muted); margin-top:4px; text-transform:uppercase; }
.stat-card.pass .value { color:var(--pass); }
.stat-card.fail .value { color:var(--fail); }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:8px 8px; border-bottom:2px solid var(--border); color:var(--muted); font-size:10px; text-transform:uppercase; cursor:pointer; user-select:none; white-space:nowrap; position:sticky; top:0; background:var(--bg); z-index:1; }
th:hover { color:var(--accent); }
th .sort-arrow { margin-left:4px; font-size:10px; }
td { padding:6px 8px; border-bottom:1px solid var(--border); }
tr.data-row { cursor:pointer; }
tr.data-row:hover { background:rgba(88,166,255,0.05); }
tr.expanded { background:rgba(88,166,255,0.03); }
tr.expand-detail { display:none; }
tr.expand-detail.show { display:table-row; background:rgba(22,27,34,0.5); }
tr.expand-detail td { padding:12px 16px; }
.attempts-table { width:100%; font-size:11px; margin-top:8px; }
.attempts-table th { background:transparent; font-size:10px; padding:4px 8px; }
.attempts-table td { padding:3px 8px; font-size:11px; }
.badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:600; }
.badge-pass { background:rgba(63,185,80,0.15); color:var(--pass); }
.badge-fail { background:rgba(248,81,73,0.15); color:var(--fail); }
.badge-absent { background:rgba(210,153,29,0.15); color:var(--warn); }
.mono { font-family:'SF Mono',monospace; font-size:11px; }
.muted { color:var(--muted); font-size:11px; }
#result-count { color:var(--muted); font-size:12px; margin-left:12px; }
.export-bar { display:flex; justify-content:flex-end; margin-bottom:12px; }
.table-wrap { max-height:70vh; overflow-y:auto; border:1px solid var(--border); border-radius:8px; }
.kbd { font-size:10px; color:var(--muted); background:var(--card); border:1px solid var(--border); padding:1px 5px; border-radius:3px; margin:0 2px; }
</style>
</head>
<body>
<h1>🎓 AAU Exit Exam Results</h1>
<p class="subtitle">471 Addis Ababa University students • 7 departments • Enriched with Dessie attendance data <span style="margin-left:16px;color:var(--muted);font-size:11px"><span class="kbd">/</span> search <span class="kbd">Esc</span> clear</span></p>

<div class="stats" id="stats"></div>

<div class="filters">
  <input type="text" id="search" placeholder="🔍 Name, ID, father, grandfather..." oninput="applyFilters()">

  <span id="result-count"></span>

<div class="export-bar">

</div>

<div class="table-wrap">

</table>

let filters = { dept:'', session:'', result:'', gender:'', minScore:0, search:'' };
let sortKey = 'idx', sortDir = 1;

// Populate dropdowns
(() => {
  const depts = [...new Set(DATA.map(r => r.d))].sort();
  const sel = document.getElementById('deptFilter');
  depts.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o); });
  
  const sessions = [...new Set(DATA.map(r => r.se).filter(Boolean))].sort();
  const ses = document.getElementById('sessionFilter');
  sessions.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; ses.appendChild(o); });
})();

function renderStats(filtered) {
  const total = filtered.length;
  const pass = filtered.filter(r => r.r.includes('Pass')).length;
  const fail = total - pass;
  const depts = new Set(filtered.map(r => r.d)).size;
  const rate = total ? (pass/total*100).toFixed(1) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card" onclick="filters={};applyFilters()"><div class="value">${total}</div><div class="label">Students</div></div>
    <div class="stat-card pass" onclick="filters.result='pass';applyFilters()"><div class="value">${pass}</div><div class="label">Passed</div></div>
    <div class="stat-card fail" onclick="filters.result='fail';applyFilters()"><div class="value">${fail}</div><div class="label">Failed</div></div>
    <div class="stat-card"><div class="value">${rate}%</div><div class="label">Pass Rate</div></div>
    <div class="stat-card"><div class="value">${depts}</div><div class="label">Departments</div></div>
  `;
}

function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let expandedRow = null;

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  let html = '';
  data.forEach((r, i) => {
    const isPass = r.r.includes('Pass');
    const score = parseFloat(r.sc) || 0;
    const latestAttempt = r.a && r.a.length ? r.a[r.a.length-1] : null;
    const absent = latestAttempt && latestAttempt.absent;
    
    html += `<tr class="data-row" onclick="toggleExpand(this, ${i})" data-idx="${i}">
      <td>${i+1}</td>
      <td class="mono">${escapeHtml(r.u)}</td>
      <td>${escapeHtml(r.n)}</td>
      <td class="muted">${escapeHtml(r.d)}</td>
      <td>${escapeHtml(r.g)}</td>
      <td>${escapeHtml(r.f)}</td>
      <td>${escapeHtml(r.gf)}</td>
      <td class="muted" style="font-size:11px">${escapeHtml(r.ec)}</td>
      <td class="muted" style="font-size:11px">${escapeHtml(r.lb)}</td>
      <td class="muted" style="font-size:11px">${escapeHtml(r.se)}</td>
      <td><span class="badge ${absent ? 'badge-absent' : isPass ? 'badge-pass' : 'badge-fail'}">${absent ? 'ABSENT' : isPass ? 'PASS' : 'FAIL'}</span></td>
      <td class="mono" style="color:${isPass ? 'var(--pass)' : score >= 40 ? 'var(--warn)' : 'var(--fail)'}">${r.sc}</td>
    </tr>`;
    
    // Expandable detail row
    if (r.a && r.a.length) {
      let attHtml = '<table class="attempts-table"><thead><tr><th>Year</th><th>Score</th><th>Status</th><th>Absent</th><th>Disqualified</th></tr></thead><tbody>';
      r.a.forEach(a => {
        const st = a.absent ? 'Absent' : a.status;
        const stCls = a.absent ? 'badge-absent' : st === 'Pass' ? 'badge-pass' : 'badge-fail';
        attHtml += `<tr>
          <td>${a.year}</td>
          <td class="mono">${a.score}</td>
          <td><span class="badge ${stCls}">${st}</span></td>
          <td>${a.absent ? '✓' : '—'}</td>
          <td>${a.disqualified ? '✓' : '—'}</td>
        </tr>`;
      });
      attHtml += '</tbody></table>';
      
      html += `<tr class="expand-detail" id="detail-${i}">
        <td colspan="12">
          <strong style="font-size:12px">Exam Attempts (${r.a.length})</strong>
          ${attHtml}
        </td>
      </tr>`;
    }
  });
  tbody.innerHTML = html;
  document.getElementById('result-count').textContent = `${data.length} of ${DATA.length} shown`;
}

function toggleExpand(row, idx) {
  const detail = document.getElementById('detail-'+idx);
  if (!detail) return;
  if (expandedRow && expandedRow !== row) {
    expandedRow.classList.remove('expanded');
    const oldIdx = expandedRow.dataset.idx;
    document.getElementById('detail-'+oldIdx)?.classList.remove('show');
  }
  if (detail.classList.contains('show')) {
    detail.classList.remove('show');
    row.classList.remove('expanded');
    expandedRow = null;
  } else {
    detail.classList.add('show');
    row.classList.add('expanded');
    expandedRow = row;
  }
}

function applyFilters() {
  filters.search = document.getElementById('search').value.toLowerCase();
  filters.dept = document.getElementById('deptFilter').value;
  filters.session = document.getElementById('sessionFilter').value;
  filters.minScore = parseInt(document.getElementById('scoreSlider').value) || 0;
  document.getElementById('scoreLabel').textContent = filters.minScore;
  
  let filtered = DATA.filter(r => {
    const score = parseFloat(r.sc) || 0;
    if (filters.dept && r.d !== filters.dept) return false;
    if (filters.session && r.se !== filters.session) return false;
    if (filters.result === 'pass' && !r.r.includes('Pass')) return false;
    if (filters.result === 'fail' && r.r.includes('Pass')) return false;
    if (filters.gender && r.g !== filters.gender) return false;
    if (score < filters.minScore) return false;
    if (filters.search) {
      const q = filters.search;
      return (r.n.toLowerCase().includes(q) || r.u.toLowerCase().includes(q) || 
              r.d.toLowerCase().includes(q) || (r.f||'').toLowerCase().includes(q) ||
              (r.gf||'').toLowerCase().includes(q) || (r.ec||'').toLowerCase().includes(q) ||
              (r.lb||'').toLowerCase().includes(q));
    }
    return true;
  });
  
  // Sort
  filtered.sort((a,b) => {
    let va, vb;
    switch(sortKey) {
      case 'u': va = a.u; vb = b.u; break;
      case 'n': va = a.n; vb = b.n; break;
      case 'd': va = a.d; vb = b.d; break;
      case 'g': va = a.g; vb = b.g; break;
      case 'f': va = a.f||''; vb = b.f||''; break;
      case 'gf': va = a.gf||''; vb = b.gf||''; break;
      case 'ec': va = a.ec||''; vb = b.ec||''; break;
      case 'lb': va = a.lb||''; vb = b.lb||''; break;
      case 'se': va = a.se||''; vb = b.se||''; break;
      case 'r': va = a.r; vb = b.r; break;
      case 'sc': va = parseFloat(a.sc)||0; vb = parseFloat(b.sc)||0; break;
      default: return 0;
    }
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });
  
  expandedRow = null;
  renderStats(filtered);
  renderTable(filtered);
  
  // Update button states
  document.getElementById('btnPass').className = 'btn btn-pass' + (filters.result==='pass'?' active':'');
  document.getElementById('btnFail').className = 'btn btn-fail' + (filters.result==='fail'?' active':'');
  document.getElementById('btnMale').className = 'btn' + (filters.gender==='Male'?' active':'');
  document.getElementById('btnFemale').className = 'btn' + (filters.gender==='Female'?' active':'');
}

function sortTable(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  applyFilters();
}

function toggleResult(r) { filters.result = filters.result===r ? '' : r; applyFilters(); }
function toggleGender(g) { filters.gender = filters.gender===g ? '' : g; applyFilters(); }

function exportCSV() {
  let filtered = DATA.filter(r => {
    const score = parseFloat(r.sc) || 0;
    if (filters.dept && r.d !== filters.dept) return false;
    if (filters.session && r.se !== filters.session) return false;
    if (filters.result === 'pass' && !r.r.includes('Pass')) return false;
    if (filters.result === 'fail' && r.r.includes('Pass')) return false;
    if (filters.gender && r.g !== filters.gender) return false;
    if (score < filters.minScore) return false;
    if (filters.search) {
      const q = filters.search;
      return (r.n.toLowerCase().includes(q) || r.u.toLowerCase().includes(q) ||
              r.d.toLowerCase().includes(q) || (r.f||'').toLowerCase().includes(q) ||
              (r.gf||'').toLowerCase().includes(q) || (r.ec||'').toLowerCase().includes(q) ||
              (r.lb||'').toLowerCase().includes(q));
    }
    return true;
  });
  
  const csv = [['ID','Name','Department','Gender','Father','Grandfather','Exam Center','Lab','Session','Result','Score','Attempts'].join(',')];
  filtered.forEach(r => {
    const row = [
      '"'+r.u+'"', '"'+r.n+'"', '"'+r.d+'"', r.g, '"'+r.f+'"', '"'+r.gf+'"',
      '"'+r.ec+'"', '"'+r.lb+'"', '"'+r.se+'"', r.r.includes('Pass')?'Pass':'Fail', r.sc,
      r.a ? r.a.map(a=>a.year+':'+a.status+'/'+a.score).join('; ') : ''
    ];
    csv.push(row.join(','));
  });
  
  const blob = new Blob([csv.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'aau_exit_exam_results.csv'; a.click();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    document.getElementById('search').blur();
    document.getElementById('deptFilter').value = '';
    document.getElementById('sessionFilter').value = '';
    document.getElementById('scoreSlider').value = 0;
    filters = { dept:'', session:'', result:'', gender:'', minScore:0, search:'' };
    sortKey = 'idx'; sortDir = 1;
    applyFilters();
  }
});

// Init
applyFilters();
</script>
