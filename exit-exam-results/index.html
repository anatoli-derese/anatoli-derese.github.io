  input[type=text]::placeholder { color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 11px; text-transform: uppercase; cursor: pointer; user-select: none; }

  td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover { background: rgba(255,255,255,0.03); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-pass { background: rgba(63,185,80,0.15); color: var(--pass); }
  .badge-fail { background: rgba(248,81,73,0.15); color: var(--fail); }
  .school-tag { color: var(--muted); font-size: 12px; }
  .count { color: var(--muted); font-size: 12px; margin-left: 8px; }
  .section-title { font-size: 16px; margin: 24px 0 12px; color: var(--accent); }
  .school-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 6px; }
  .school-row { display: flex; justify-content: space-between; padding: 6px 12px; background: var(--card); border-radius: 4px; font-size: 13px; }

function renderStats() {
  const pass = DATA.filter(r => r.result.includes('Pass')).length;
  const fail = DATA.filter(r => r.result.includes('Fail')).length;
  const schools = new Set(DATA.map(r => r.school)).size;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="value">${DATA.length}</div><div class="label">Students</div></div>
    <div class="stat-card pass"><div class="value">${pass}</div><div class="label">Passed</div></div>
    <div class="stat-card fail"><div class="value">${fail}</div><div class="label">Failed</div></div>
    <div class="stat-card"><div class="value">${schools}</div><div class="label">Schools</div></div>
    <div class="stat-card"><div class="value">${(pass/DATA.length*100).toFixed(1)}%</div><div class="label">Pass Rate</div></div>
  `;
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = data.map((r, i) => {
    const isPass = r.result.includes('Pass');
    const scoreMatch = r.result.match(/Score:\s*([\d.]+)/);
    const score = scoreMatch ? scoreMatch[1] : '-';
    return `<tr>
      <td>${i + 1}</td>
      <td style="font-family:monospace;font-size:12px">${r.username}</td>
      <td>${r.name}</td>
      <td class="school-tag">${r.school}</td>
      <td><span class="badge ${isPass ? 'badge-pass' : 'badge-fail'}">${isPass ? 'PASS' : 'FAIL'}</span></td>
      <td style="font-family:monospace">${score}</td>
    </tr>`;
  }).join('');
}

let sortCol = -1, sortAsc = true;
function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  const keys = ['', 'username', 'name', 'school', 'result', 'result'];
  const key = keys[col];
  const sorted = [...DATA].sort((a, b) => {
    let va = (a[key] || '').toLowerCase(), vb = (b[key] || '').toLowerCase();
    if (col === 5) { va = parseFloat(va.match(/Score:\s*([\d.]+)/)?.[1] || 0); vb = parseFloat(vb.match(/Score:\s*([\d.]+)/)?.[1] || 0); }
    return (va < vb ? -1 : va > vb ? 1 : 0) * (sortAsc ? 1 : -1);
  });
  renderTable(sorted);
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = DATA.filter(r => 
    r.username.toLowerCase().includes(q) || r.name.toLowerCase().includes(q) || 
    r.school.toLowerCase().includes(q) || r.result.toLowerCase().includes(q)
  );
  renderTable(filtered);
}
